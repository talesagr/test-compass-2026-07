spring:
  application:
    name: digital-bank-api
  datasource:
    url: jdbc:postgresql://localhost:5432/digital_bank
    username: bank
    password: bank
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      jakarta.persistence.lock.timeout: "5000"
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:digitalbank;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      jakarta.persistence.lock.timeout: "5000"
  flyway:
    enabled: false
